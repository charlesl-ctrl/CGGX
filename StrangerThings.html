<!DOCTYPE html>
<html lang="en">
<head>
   <title>CGGX : Stranger Things Vid</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/charlesl-ctrl/CGGX@main/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/charlesl-ctrl/CGGX@main/iframe.css">
</head>

<body>
  <h1>Stranger Things</h1>
  <video id="myVideo" width="800" playsinline>
  <source src="https://cdn.jsdelivr.net/gh/charlesl-ctrl/CGGX@main/StrangerThings.mp4" type="video/mp4">
</video>

<button onclick="playVideo()">Play Video</button>

<script>
function playVideo() {
  const video = document.getElementById("myVideo");
  video.muted = false;   // enable audio
  video.play();
}
</script>

</body>
</html>
